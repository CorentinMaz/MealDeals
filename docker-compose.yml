services:
  postgres:
    image: postgres:17-alpine
    container_name: mealdeals-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mealdeals
    volumes:
      - mealdeals_pgdata:/var/lib/postgresql/data

volumes:
  mealdeals_pgdata:
